name: C CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # 🔥 핵심: Makefile 위치로 이동
    defaults:
      run:
        working-directory: SampleCodes/RearOccupantAlert

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Clean build
        run: make clean

      - name: Build project
        run: make

      - name: Run simulation
        run: make run
