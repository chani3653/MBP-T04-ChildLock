name: C CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        usecase:
          - { name: "UC-001 ChildLockControl",  dir: "SampleCodes/ChildLockControl" }
          - { name: "UC-002 EmergencyUnlock",    dir: "SampleCodes/EmergencyUnlock" }
          - { name: "UC-003 RearOccupantAlert",  dir: "SampleCodes/RearOccupantAlert" }

    name: ${{ matrix.usecase.name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Clean
        run: make clean
        working-directory: ${{ matrix.usecase.dir }}

      - name: Build
        run: make
        working-directory: ${{ matrix.usecase.dir }}

      - name: Run simulation
        run: make run
        working-directory: ${{ matrix.usecase.dir }}
