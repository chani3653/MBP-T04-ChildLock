name: C CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Check directory
        run: |
          pwd
          ls
          ls SampleCodes
          ls SampleCodes/RearOccupantAlert

      - name: Clean build
        run: make clean
        working-directory: SampleCodes/RearOccupantAlert

      - name: Build project
        run: make
        working-directory: SampleCodes/RearOccupantAlert

      - name: Run simulation
        run: make run
        working-directory: SampleCodes/RearOccupantAlert
